<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background: #050505;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
      font-weight: 400;
      color: #F5F5F7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: pan-y;
      overflow-x: hidden;
    }

    .iphone-frame {
      max-width: 390px;
      width: 100%;
      background: #050505;
      border-radius: 48px;
      padding: 24px 16px 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03);
      margin: 0 auto;
      position: relative;
    }

    .safe-area {
      padding: 0 8px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 4px;
      margin-top: -8px;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: #F5F5F7;
      line-height: 1;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      transition: none;
    }

    .plus-btn {
      width: 28px;
      height: 28px;
      background: #F5F5F7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #050505;
      font-size: 18px;
      font-weight: 300;
      transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(255,255,255,0.12);
      border: none;
      will-change: transform;
      line-height: 1;
      flex-shrink: 0;
    }

    .plus-btn:active {
      transform: scale(0.88);
      background: #d0d0d2;
    }

    .stats-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      min-height: 170px;
      transition: none;
    }

    .stat-card {
      flex: 1;
      background: #1C1C1E;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 18px 16px 16px;
      min-height: 170px;
      border: 0.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 18px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      cursor: default;
      opacity: 1;
      transform: scale(1);
    }

    .stat-card.hidden {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
      min-height: 0;
      height: 0;
      padding: 0;
      margin: 0;
      border: none;
      overflow: hidden;
      flex: 0;
    }

    .stat-card:active {
      transform: scale(0.97);
      background: #222225;
    }

    .stat-card.full-width {
      flex: 1 1 100%;
      max-width: 100%;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .ring-wrapper {
      position: relative;
      width: 55px;
      height: 55px;
      cursor: pointer;
    }

    .ring-wrapper:active {
      transform: scale(0.92);
    }

    .ring-bg {
      fill: none;
      stroke: #3a3a3c;
      stroke-width: 4;
    }

    .ring-progress {
      fill: none;
      stroke: #F5F5F7;
      stroke-width: 4;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .ring-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px;
      font-weight: 700;
      color: #F5F5F7;
      font-variant-numeric: tabular-nums;
      transition: transform 0.15s ease;
    }

    .ring-label:active {
      transform: translate(-50%, -50%) scale(0.9);
    }

    .card-icon {
      color: #636366;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .card-icon:active {
      color: #F5F5F7;
    }

    .stat-footer .label {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #F5F5F7;
    }

    .stat-footer .sub {
      font-size: 15px;
      color: #A1A1A6;
      font-weight: 400;
    }

    .stat-card .big-number {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
      color: #F5F5F7;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .stat-card .big-number:active {
      transform: scale(0.92);
    }

    .big-number span {
      font-size: 20px;
      font-weight: 500;
      color: #A1A1A6;
      margin-left: 4px;
    }

    .stat-card .meta {
      font-size: 15px;
      color: #A1A1A6;
      font-weight: 400;
      margin-top: 6px;
    }

    /* CALENDAR WIDGET */
    .activity-card {
      background: #1C1C1E;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 18px 16px 16px;
      border: 0.5px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      margin-bottom: 16px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-height: 210px;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    .activity-card.expanded {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 390px;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      z-index: 100;
      margin: 0;
      padding: 40px 20px 30px;
      overflow-y: auto;
      background: #050505;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      cursor: default;
      transform: scale(1) !important;
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
    }

    .activity-card.expanded .calendar-header {
      margin-bottom: 16px;
    }

    .activity-card.expanded .calendar-grid {
      gap: 8px 4px;
    }

    .activity-card.expanded .day-cell {
      padding: 6px 0;
      border-radius: 12px;
    }

    .activity-card.expanded .day-cell .day-number {
      font-size: 18px;
    }

    .activity-card.expanded .day-cell .day-score {
      font-size: 11px;
    }

    .activity-card .close-btn {
      display: none;
      position: absolute;
      top: 12px;
      right: 16px;
      color: #A1A1A6;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
    }

    .activity-card.expanded .close-btn {
      display: block;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: #A1A1A6;
      font-size: 16px;
      font-weight: 600;
    }

    .calendar-header .month-nav {
      cursor: pointer;
      padding: 4px 12px;
      color: #A1A1A6;
      transition: color 0.2s;
      font-size: 18px;
    }

    .calendar-header .month-nav:active {
      color: #F5F5F7;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: #636366;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px 2px;
      transition: all 0.3s ease;
    }

    .day-cell {
      text-align: center;
      padding: 4px 0;
      border-radius: 8px;
      transition: all 0.15s ease;
      cursor: pointer;
      min-height: 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .day-cell:active {
      transform: scale(0.92);
      background: rgba(255,255,255,0.05);
    }

    .day-cell .day-number {
      font-size: 14px;
      font-weight: 500;
      color: #A1A1A6;
      line-height: 1.2;
    }

    .day-cell .day-score {
      font-size: 9px;
      color: #636366;
      line-height: 1.2;
      margin-top: 1px;
      font-weight: 500;
    }

    .day-cell.today .day-number {
      color: #F5F5F7;
      font-weight: 700;
      background: #F5F5F7;
      color: #050505;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .day-cell.today .day-score {
      color: #A1A1A6;
    }

    .day-cell.other-month .day-number {
      color: #3a3a3c;
    }

    .day-cell.other-month .day-score {
      color: #2c2c2e;
    }

    .day-cell.has-score .day-score {
      color: #F5F5F7;
    }

    .day-cell.has-score.other-month .day-score {
      color: #4a4a4c;
    }

    .day-cell.selected .day-number {
      color: #050505;
      background: #F5F5F7;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    /* Daily Journal */
    .daily-journal {
      display: none;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 0.5px solid rgba(255,255,255,0.06);
    }

    .activity-card.expanded .daily-journal {
      display: block;
    }

    .journal-date {
      font-size: 28px;
      font-weight: 700;
      color: #F5F5F7;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .journal-category {
      background: #1C1C1E;
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 14px;
      border: 0.5px solid rgba(255,255,255,0.04);
    }

    .journal-category .cat-title {
      font-size: 16px;
      font-weight: 600;
      color: #A1A1A6;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .journal-category .cat-title .cat-score {
      font-size: 14px;
      font-weight: 500;
      color: #F5F5F7;
    }

    .journal-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.03);
      cursor: pointer;
    }

    .journal-item:last-child {
      border-bottom: none;
    }

    .journal-item .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #636366;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 12px;
      color: transparent;
    }

    .journal-item .check.done {
      border-color: #F5F5F7;
      background: #F5F5F7;
      color: #050505;
    }

    .journal-item .task-text {
      font-size: 15px;
      color: #F5F5F7;
      flex: 1;
    }

    .journal-item .task-text.done-text {
      color: #636366;
      text-decoration: line-through;
    }

    .journal-item .task-score {
      font-size: 13px;
      color: #636366;
      font-weight: 500;
    }

    .focus-selector {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .focus-btn {
      padding: 6px 16px;
      border-radius: 16px;
      background: #2C2C2E;
      border: 0.5px solid rgba(255,255,255,0.04);
      color: #A1A1A6;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    }

    .focus-btn:active {
      transform: scale(0.92);
    }

    .focus-btn.active {
      background: #F5F5F7;
      color: #050505;
    }

    .add-task-btn {
      color: #636366;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .add-task-btn:active {
      color: #F5F5F7;
    }

    .task-input-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .task-input-row input {
      flex: 1;
      background: #2C2C2E;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 14px;
      color: #F5F5F7;
      font-size: 15px;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      outline: none;
    }

    .task-input-row input:focus {
      border-color: rgba(255,255,255,0.3);
    }

    .task-input-row button {
      padding: 10px 18px;
      background: #F5F5F7;
      border: none;
      border-radius: 12px;
      color: #050505;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    }

    .task-input-row button:active {
      transform: scale(0.92);
    }

    .volume-card {
      background: #1C1C1E;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 18px 22px;
      border: 0.5px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      transition: all 0.2s ease;
      height: 75px;
    }

    .volume-card:active {
      transform: scale(0.97);
      background: #222225;
    }

    .volume-left .label {
      font-size: 18px;
      font-weight: 600;
      color: #F5F5F7;
    }
    .volume-left .sub {
      font-size: 15px;
      color: #A1A1A6;
      font-weight: 400;
    }
    .volume-right {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: #F5F5F7;
    }
    .volume-right small {
      font-size: 20px;
      font-weight: 500;
      color: #A1A1A6;
      margin-left: 4px;
    }

    .bottom-nav {
      background: #1C1C1E;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      height: 64px;
      width: 100%;
      max-width: 290px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.04);
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #636366;
      transition: all 0.15s ease;
      cursor: pointer;
      padding: 8px;
      border-radius: 30px;
      min-width: 44px;
      min-height: 44px;
    }

    .nav-item i {
      font-size: 24px;
      transition: color 0.15s;
    }

    .nav-item.active i {
      color: #F5F5F7;
    }

    .nav-item:active {
      transform: scale(0.88);
      background: rgba(255,255,255,0.05);
    }

    /* iOS Sheet */
    .ios-sheet-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .ios-sheet-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .ios-sheet {
      background: #1C1C1E;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 36px;
      max-width: 390px;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
      border-top: 0.5px solid rgba(255,255,255,0.06);
    }

    .ios-sheet-overlay.active .ios-sheet {
      transform: translateY(0);
    }

    .ios-sheet .sheet-title {
      font-size: 22px;
      font-weight: 700;
      color: #F5F5F7;
      margin-bottom: 20px;
      text-align: center;
    }

    .ios-sheet .field {
      margin-bottom: 18px;
    }

    .ios-sheet .field label {
      font-size: 15px;
      font-weight: 500;
      color: #A1A1A6;
      display: block;
      margin-bottom: 6px;
    }

    .ios-sheet .field input {
      width: 100%;
      background: #2C2C2E;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px;
      color: #F5F5F7;
      font-size: 17px;
      font-weight: 400;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .ios-sheet .field input:focus {
      border-color: rgba(255,255,255,0.3);
    }

    .ios-sheet .field input::placeholder {
      color: #636366;
    }

    .sheet-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .sheet-btn {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .sheet-btn:active {
      transform: scale(0.96);
    }

    .sheet-btn.cancel {
      background: #2C2C2E;
      color: #A1A1A6;
    }

    .sheet-btn.primary {
      background: #F5F5F7;
      color: #050505;
    }

    .sheet-btn.danger {
      background: #E53935;
      color: #fff;
    }

    .ios-notification {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px) scale(0.95);
      background: rgba(28,28,30,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 16px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.08);
      border: 0.5px solid rgba(255,255,255,0.1);
      color: #F5F5F7;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      pointer-events: none;
      width: 80%;
      max-width: 320px;
      text-align: center;
    }

    .ios-notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }

    .ios-notification .notif-title {
      font-size: 17px;
      font-weight: 600;
      display: block;
      margin-bottom: 2px;
      color: #F5F5F7;
    }
    .ios-notification .notif-sub {
      font-size: 15px;
      font-weight: 400;
      color: #A1A1A6;
    }

    .longpress-menu {
      position: fixed;
      background: #1C1C1E;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 8px 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 0.5px rgba(255,255,255,0.06);
      z-index: 1001;
      min-width: 180px;
      opacity: 0;
      transform: scale(0.92);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .longpress-menu.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .longpress-menu .menu-item {
      padding: 12px 20px;
      color: #F5F5F7;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    }

    .longpress-menu .menu-item:active {
      background: rgba(255,255,255,0.05);
    }

    .longpress-menu .menu-item.danger {
      color: #E53935;
    }

    .activity-card.expanded::-webkit-scrollbar {
      width: 0;
    }

    @media (max-width: 400px) {
      .activity-card.expanded {
        padding: 30px 14px 20px;
      }
    }

    /* sections visibility */
    .section-content {
      display: block;
      transition: none;
    }

    .section-content.hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="iphone-frame" id="app">
    <div class="safe-area">
      <div class="header-row">
        <div class="title" id="screenTitle">Calendar</div>
        <div class="plus-btn" id="addBtn"><i class="fas fa-plus"></i></div>
      </div>

      <!-- Habits section -->
      <div class="stats-grid" id="habitsGrid"></div>

      <!-- Calendar Widget -->
      <div class="activity-card" id="calendarWidget">
        <div class="close-btn" id="closeJournal"><i class="fas fa-xmark"></i></div>
        <div class="calendar-header">
          <span class="month-nav" id="prevMonth"><i class="fas fa-chevron-left"></i></span>
          <span id="monthTitle">July 2026</span>
          <span class="month-nav" id="nextMonth"><i class="fas fa-chevron-right"></i></span>
        </div>
        <div class="calendar-weekdays" id="weekdays"></div>
        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="daily-journal" id="dailyJournal">
          <div class="journal-date" id="journalDate">Friday, July 18</div>

          <div class="journal-category" id="routineCategory">
            <div class="cat-title">Routine <span class="cat-score" id="routineScore">0/3</span></div>
            <div id="routineList"></div>
          </div>

          <div class="journal-category">
            <div class="cat-title">Focus <span class="cat-score" id="focusScore">0/2</span></div>
            <div class="focus-selector" id="focusSelector">
              <button class="focus-btn" data-focus="0">0</button>
              <button class="focus-btn" data-focus="1">1</button>
              <button class="focus-btn" data-focus="2">2</button>
            </div>
          </div>

          <div class="journal-category">
            <div class="cat-title">Tasks <span class="cat-score" id="tasksScore">0/5</span></div>
            <div id="tasksList"></div>
            <div class="add-task-btn" id="addTaskBtn"><i class="fas fa-plus"></i> Add Task</div>
            <div class="task-input-row" id="taskInputRow" style="display:none;">
              <input type="text" id="taskInput" placeholder="New task..." maxlength="60">
              <button id="taskAddConfirm">Add</button>
            </div>
          </div>
        </div>
      </div>

      <div class="volume-card" id="volumeCard">
        <div class="volume-left">
          <div class="label">Volume lifted</div>
          <div class="sub">Last 7 days</div>
        </div>
        <div class="volume-right">3.200 <small>lbs</small></div>
      </div>

      <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" data-tab="workouts"><i class="fas fa-bolt"></i></div>
        <div class="nav-item active" data-tab="calendar"><i class="fas fa-calendar-alt"></i></div>
        <div class="nav-item" data-tab="wallet"><i class="fas fa-wallet"></i></div>
        <div class="nav-item" data-tab="food"><i class="fas fa-utensils"></i></div>
        <div class="nav-item" data-tab="notes"><i class="fas fa-sticky-note"></i></div>
      </div>
    </div>
  </div>

  <!-- Sheets -->
  <div class="ios-sheet-overlay" id="sheetOverlay">
    <div class="ios-sheet">
      <div class="sheet-title">New Habit</div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="habitNameInput" placeholder="e.g. Drink Water" maxlength="30">
      </div>
      <div class="field">
        <label>Goal (days)</label>
        <input type="number" id="habitGoalInput" placeholder="e.g. 100" min="1" max="9999">
      </div>
      <div class="sheet-actions">
        <button class="sheet-btn cancel" id="sheetCancel">Cancel</button>
        <button class="sheet-btn primary" id="sheetConfirm">Add Habit</button>
      </div>
    </div>
  </div>

  <div class="ios-sheet-overlay" id="resetSheetOverlay">
    <div class="ios-sheet">
      <div class="sheet-title">Reset habit?</div>
      <p style="color:#A1A1A6;font-size:16px;text-align:center;margin-bottom:20px;">All progress will be deleted.</p>
      <div class="sheet-actions">
        <button class="sheet-btn cancel" id="resetCancel">Cancel</button>
        <button class="sheet-btn danger" id="resetConfirm">Reset</button>
      </div>
    </div>
  </div>

  <div class="ios-sheet-overlay" id="deleteSheetOverlay">
    <div class="ios-sheet">
      <div class="sheet-title">Delete habit?</div>
      <p style="color:#A1A1A6;font-size:16px;text-align:center;margin-bottom:20px;">This action cannot be undone.</p>
      <div class="sheet-actions">
        <button class="sheet-btn cancel" id="deleteCancel">Cancel</button>
        <button class="sheet-btn danger" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="longpress-menu" id="longpressMenu">
    <button class="menu-item danger" id="menuDelete">Delete Habit</button>
  </div>

  <div class="ios-notification" id="notification">
    <span class="notif-title">Done</span>
    <span class="notif-sub">Action completed</span>
  </div>

  <script>
    (function() {
      let appData = {};
      const STORAGE_KEY = 'ps_app_data_v3';

      function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          try {
            appData = JSON.parse(raw);
            if (!appData.calendar) appData.calendar = {};
            if (!appData.calendar.days) appData.calendar.days = {};
            if (!appData.calendar.routine) {
              appData.calendar.routine = [
                { id: 'r1', text: 'Workout' },
                { id: 'r2', text: 'Reading' },
                { id: 'r3', text: 'Water' }
              ];
            }
            if (!appData.calendar.focus) appData.calendar.focus = {};
            if (!appData.calendar.tasks) appData.calendar.tasks = {};
            if (!appData.habits) appData.habits = [];
            if (appData.habits.length === 0) {
              appData.habits = [
                { id: 'h1', name: 'Chest + tricep', goal: 100, streak: 1, completedToday: true, lastDate: getToday(), createdAt: getToday() },
                { id: 'h2', name: 'Body weight', goal: 50, streak: 0, completedToday: false, lastDate: getToday(), createdAt: getToday() }
              ];
            }
            saveData();
            return;
          } catch(e) {}
        }
        appData = {
          habits: [
            { id: 'h1', name: 'Chest + tricep', goal: 100, streak: 1, completedToday: true, lastDate: getToday(), createdAt: getToday() },
            { id: 'h2', name: 'Body weight', goal: 50, streak: 0, completedToday: false, lastDate: getToday(), createdAt: getToday() }
          ],
          calendar: {
            days: {},
            routine: [
              { id: 'r1', text: 'Workout' },
              { id: 'r2', text: 'Reading' },
              { id: 'r3', text: 'Water' }
            ],
            focus: {},
            tasks: {}
          }
        };
        saveData();
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      }

      function getToday() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      }

      function formatDateShort(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { day: 'numeric', month: 'long' });
      }

      function getDayScore(dateStr) {
        let total = 0;
        const day = appData.calendar.days[dateStr];
        if (day) {
          if (day.routineDone) total += day.routineDone;
          if (day.focus !== undefined) total += day.focus;
          if (day.tasksDone) total += day.tasksDone;
        }
        return Math.min(total, 10);
      }

      function getDayData(dateStr) {
        if (!appData.calendar.days[dateStr]) {
          appData.calendar.days[dateStr] = { routineDone: 0, focus: 0, tasksDone: 0 };
          saveData();
        }
        return appData.calendar.days[dateStr];
      }

      // DOM
      const habitsGrid = document.getElementById('habitsGrid');
      const titleEl = document.getElementById('screenTitle');
      const addBtn = document.getElementById('addBtn');
      const calendarWidget = document.getElementById('calendarWidget');
      const monthTitle = document.getElementById('monthTitle');
      const calendarGrid = document.getElementById('calendarGrid');
      const weekdaysEl = document.getElementById('weekdays');
      const prevMonthBtn = document.getElementById('prevMonth');
      const nextMonthBtn = document.getElementById('nextMonth');
      const closeJournalBtn = document.getElementById('closeJournal');
      const dailyJournal = document.getElementById('dailyJournal');
      const journalDate = document.getElementById('journalDate');
      const routineList = document.getElementById('routineList');
      const routineScore = document.getElementById('routineScore');
      const focusSelector = document.getElementById('focusSelector');
      const focusScore = document.getElementById('focusScore');
      const tasksList = document.getElementById('tasksList');
      const tasksScore = document.getElementById('tasksScore');
      const addTaskBtn = document.getElementById('addTaskBtn');
      const taskInputRow = document.getElementById('taskInputRow');
      const taskInput = document.getElementById('taskInput');
      const taskAddConfirm = document.getElementById('taskAddConfirm');

      const sheetOverlay = document.getElementById('sheetOverlay');
      const resetSheetOverlay = document.getElementById('resetSheetOverlay');
      const deleteSheetOverlay = document.getElementById('deleteSheetOverlay');
      const longpressMenu = document.getElementById('longpressMenu');
      const notification = document.getElementById('notification');

      const habitNameInput = document.getElementById('habitNameInput');
      const habitGoalInput = document.getElementById('habitGoalInput');

      let currentMonth = new Date().getMonth();
      let currentYear = new Date().getFullYear();
      let selectedDate = getToday();
      let isExpanded = false;
      let currentHabitId = null;
      let resetTargetId = null;
      let deleteTargetId = null;
      let currentTab = 'calendar';
      let clickTimer = null;

      function showNotification(title, sub) {
        notification.querySelector('.notif-title').textContent = title || 'Done';
        notification.querySelector('.notif-sub').textContent = sub || 'Action completed';
        notification.classList.add('show');
        clearTimeout(notifTimer);
        notifTimer = setTimeout(() => {
          notification.classList.remove('show');
        }, 2500);
      }
      let notifTimer = null;

      function haptic() { if (navigator.vibrate) navigator.vibrate(8); }

      // Calendar render
      function renderCalendar() {
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        monthTitle.textContent = monthNames[currentMonth] + ' ' + currentYear;

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

        const today = getToday();

        let html = '';
        for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
          const dayNum = daysInPrevMonth - i;
          const dateObj = new Date(currentYear, currentMonth - 1, dayNum);
          const dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth()+1).padStart(2,'0') + '-' + String(dateObj.getDate()).padStart(2,'0');
          const score = getDayScore(dateStr);
          html += `<div class="day-cell other-month"><div class="day-number">${dayNum}</div><div class="day-score">${score > 0 ? score : ''}</div></div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const dateObj = new Date(currentYear, currentMonth, d);
          const dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth()+1).padStart(2,'0') + '-' + String(dateObj.getDate()).padStart(2,'0');
          const score = getDayScore(dateStr);
          const isToday = dateStr === today;
          const isSelected = dateStr === selectedDate;
          let cls = 'day-cell';
          if (isToday) cls += ' today';
          if (isSelected && !isExpanded) cls += ' selected';
          if (score > 0) cls += ' has-score';
          html += `<div class="${cls}" data-date="${dateStr}"><div class="day-number">${d}</div><div class="day-score">${score > 0 ? score : ''}</div></div>`;
        }

        const totalCells = (firstDay === 0 ? 6 : firstDay - 1) + daysInMonth;
        const remaining = 42 - totalCells;
        for (let d = 1; d <= remaining; d++) {
          const dateObj = new Date(currentYear, currentMonth + 1, d);
          const dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth()+1).padStart(2,'0') + '-' + String(dateObj.getDate()).padStart(2,'0');
          const score = getDayScore(dateStr);
          html += `<div class="day-cell other-month"><div class="day-number">${d}</div><div class="day-score">${score > 0 ? score : ''}</div></div>`;
        }

        calendarGrid.innerHTML = html;

        // Double click to expand
        document.querySelectorAll('.day-cell:not(.other-month)').forEach(el => {
          el.addEventListener('click', function() {
            const date = this.dataset.date;
            if (!date) return;
            if (clickTimer) {
              clearTimeout(clickTimer);
              clickTimer = null;
              // double click
              selectedDate = date;
              if (!isExpanded) {
                expandCalendar(date);
              } else {
                renderJournal(date);
              }
            } else {
              clickTimer = setTimeout(() => {
                clickTimer = null;
                // single click - do nothing
              }, 300);
            }
          });
        });

        document.querySelectorAll('.day-cell.other-month').forEach(el => {
          el.addEventListener('click', function() {
            const dayNum = parseInt(this.querySelector('.day-number').textContent);
            const isPrev = dayNum > 15;
            if (isPrev) {
              currentMonth--;
              if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            } else {
              currentMonth++;
              if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            }
            renderCalendar();
          });
        });

        if (!isExpanded) {
          document.querySelectorAll('.day-cell').forEach(el => {
            el.classList.remove('selected');
            if (el.dataset.date === selectedDate) {
              el.classList.add('selected');
            }
          });
        }
      }

      // Journal
      function renderJournal(dateStr) {
        if (!dateStr) dateStr = selectedDate;
        selectedDate = dateStr;
        const d = new Date(dateStr + 'T00:00:00');
        const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        journalDate.textContent = weekdays[d.getDay()] + ', ' + formatDateShort(dateStr);

        const dayData = getDayData(dateStr);

        // Routine
        const routine = appData.calendar.routine || [];
        let routineDoneCount = 0;
        let routineHtml = '';
        routine.forEach((item, idx) => {
          const done = dayData.routineDone && dayData.routineDone > idx ? true : false;
          if (done) routineDoneCount++;
          routineHtml += `
            <div class="journal-item" data-routine-id="${item.id}">
              <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
              <span class="task-text ${done ? 'done-text' : ''}">${item.text}</span>
              <span class="task-score">${done ? '1' : '0'}</span>
            </div>
          `;
        });
        routineList.innerHTML = routineHtml;
        routineScore.textContent = routineDoneCount + '/3';

        document.querySelectorAll('#routineList .journal-item').forEach((el, idx) => {
          el.addEventListener('click', function() {
            const done = this.querySelector('.check').classList.toggle('done');
            const text = this.querySelector('.task-text');
            const score = this.querySelector('.task-score');
            if (done) {
              this.querySelector('.check').textContent = '✓';
              text.classList.add('done-text');
              score.textContent = '1';
            } else {
              this.querySelector('.check').textContent = '';
              text.classList.remove('done-text');
              score.textContent = '0';
            }
            let count = 0;
            document.querySelectorAll('#routineList .journal-item .check.done').forEach(el => count++);
            dayData.routineDone = count;
            saveData();
            updateScores(dateStr);
            renderCalendar();
            showNotification('Routine', done ? 'Completed ✓' : 'Undone');
          });
        });

        // Long press on routine to edit
        document.querySelectorAll('#routineList .journal-item').forEach(el => {
          let pressTimer = null;
          el.addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => {
              const text = el.querySelector('.task-text').textContent;
              const newText = prompt('Edit routine task:', text);
              if (newText && newText.trim()) {
                const id = el.dataset.routineId;
                const routineItem = appData.calendar.routine.find(r => r.id === id);
                if (routineItem) {
                  routineItem.text = newText.trim();
                  saveData();
                  renderJournal(selectedDate);
                  showNotification('Routine updated', newText.trim());
                }
              }
            }, 500);
          });
          el.addEventListener('touchend', () => clearTimeout(pressTimer));
          el.addEventListener('touchmove', () => clearTimeout(pressTimer));
          el.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
              const text = el.querySelector('.task-text').textContent;
              const newText = prompt('Edit routine task:', text);
              if (newText && newText.trim()) {
                const id = el.dataset.routineId;
                const routineItem = appData.calendar.routine.find(r => r.id === id);
                if (routineItem) {
                  routineItem.text = newText.trim();
                  saveData();
                  renderJournal(selectedDate);
                  showNotification('Routine updated', newText.trim());
                }
              }
            }, 500);
          });
          el.addEventListener('mouseup', () => clearTimeout(pressTimer));
          el.addEventListener('mouseleave', () => clearTimeout(pressTimer));
        });

        // Focus
        const focusVal = dayData.focus !== undefined ? dayData.focus : 0;
        document.querySelectorAll('.focus-btn').forEach(btn => {
          btn.classList.toggle('active', parseInt(btn.dataset.focus) === focusVal);
        });
        focusScore.textContent = focusVal + '/2';

        document.querySelectorAll('.focus-btn').forEach(btn => {
          btn.onclick = function() {
            const val = parseInt(this.dataset.focus);
            dayData.focus = val;
            saveData();
            updateScores(dateStr);
            renderCalendar();
            showNotification('Focus', 'Updated to ' + val);
          };
        });

        // Tasks
        const tasks = appData.calendar.tasks[dateStr] || [];
        let tasksDoneCount = 0;
        let tasksHtml = '';
        tasks.forEach((task, idx) => {
          const done = dayData.tasksDone && dayData.tasksDone > idx ? true : false;
          if (done) tasksDoneCount++;
          tasksHtml += `
            <div class="journal-item" data-task-idx="${idx}">
              <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
              <span class="task-text ${done ? 'done-text' : ''}">${task}</span>
              <span class="task-score">${done ? '1' : '0'}</span>
            </div>
          `;
        });
        tasksList.innerHTML = tasksHtml;
        tasksScore.textContent = tasksDoneCount + '/5';

        document.querySelectorAll('#tasksList .journal-item').forEach((el, idx) => {
          el.addEventListener('click', function() {
            const done = this.querySelector('.check').classList.toggle('done');
            const text = this.querySelector('.task-text');
            const score = this.querySelector('.task-score');
            if (done) {
              this.querySelector('.check').textContent = '✓';
              text.classList.add('done-text');
              score.textContent = '1';
            } else {
              this.querySelector('.check').textContent = '';
              text.classList.remove('done-text');
              score.textContent = '0';
            }
            let count = 0;
            document.querySelectorAll('#tasksList .journal-item .check.done').forEach(el => count++);
            dayData.tasksDone = count;
            saveData();
            updateScores(dateStr);
            renderCalendar();
            showNotification('Task', done ? 'Completed ✓' : 'Undone');
          });
        });

        addTaskBtn.onclick = function() {
          taskInputRow.style.display = 'flex';
          taskInput.focus();
        };

        taskAddConfirm.onclick = function() {
          const text = taskInput.value.trim();
          if (!text) return;
          if (!appData.calendar.tasks[dateStr]) appData.calendar.tasks[dateStr] = [];
          if (appData.calendar.tasks[dateStr].length >= 7) {
            showNotification('Error', 'Maximum 7 tasks');
            return;
          }
          appData.calendar.tasks[dateStr].push(text);
          saveData();
          taskInput.value = '';
          taskInputRow.style.display = 'none';
          renderJournal(dateStr);
          showNotification('Task added', text);
        };

        taskInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') taskAddConfirm.click();
        });

        updateScores(dateStr);
      }

      function updateScores(dateStr) {
        const dayData = getDayData(dateStr);
        if (isExpanded) {
          const routineCount = dayData.routineDone || 0;
          routineScore.textContent = routineCount + '/3';
          const focusVal = dayData.focus || 0;
          focusScore.textContent = focusVal + '/2';
          const tasksCount = dayData.tasksDone || 0;
          tasksScore.textContent = tasksCount + '/5';
        }
        renderCalendar();
      }

      function expandCalendar(dateStr) {
        if (isExpanded) return;
        isExpanded = true;
        calendarWidget.classList.add('expanded');
        dailyJournal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        selectedDate = dateStr || getToday();
        renderJournal(selectedDate);
        renderCalendar();
        document.querySelectorAll('.day-cell').forEach(el => {
          el.classList.remove('selected');
          if (el.dataset.date === selectedDate) {
            el.classList.add('selected');
          }
        });
      }

      function collapseCalendar() {
        if (!isExpanded) return;
        isExpanded = false;
        calendarWidget.classList.remove('expanded');
        dailyJournal.style.display = 'none';
        document.body.style.overflow = '';
        renderCalendar();
        document.querySelectorAll('.day-cell').forEach(el => {
          el.classList.remove('selected');
          if (el.dataset.date === selectedDate) {
            el.classList.add('selected');
          }
        });
      }

      // Habits
      function renderHabits() {
        const habits = appData.habits || [];
        const count = habits.length;
        habitsGrid.innerHTML = '';
        if (count === 0) {
          const emptyCard = document.createElement('div');
          emptyCard.className = 'stat-card full-width';
          emptyCard.style.display = 'flex';
          emptyCard.style.alignItems = 'center';
          emptyCard.style.justifyContent = 'center';
          emptyCard.style.color = '#636366';
          emptyCard.style.fontSize = '16px';
          emptyCard.style.fontWeight = '500';
          emptyCard.textContent = 'No habits. Tap + to create.';
          habitsGrid.appendChild(emptyCard);
          return;
        }

        habits.forEach((habit) => {
          const card = document.createElement('div');
          card.className = 'stat-card';
          if (count === 1) card.classList.add('full-width');
          card.dataset.habitId = habit.id;

          const progress = habit.goal > 0 ? Math.min((habit.streak / habit.goal) * 100, 100) : 0;
          const circumference = 138.23;
          const offset = circumference - (progress / 100) * circumference;

          card.innerHTML = `
            <div class="card-top">
              <div class="ring-wrapper" data-action="toggle">
                <svg width="55" height="55" viewBox="0 0 55 55">
                  <circle class="ring-bg" cx="27.5" cy="27.5" r="22" />
                  <circle class="ring-progress" cx="27.5" cy="27.5" r="22" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" />
                </svg>
                <div class="ring-label" data-action="toggle">${habit.streak}</div>
              </div>
              <div class="card-icon" data-action="settings"><i class="fas fa-undo-alt"></i></div>
            </div>
            <div class="stat-footer">
              <div class="label">${habit.name}</div>
              <div class="sub">${habit.completedToday ? 'Today ✓' : 'Today'}</div>
            </div>
          `;

          const toggleArea = card.querySelector('[data-action="toggle"]');
          toggleArea.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleHabit(habit.id);
          });

          const settingsBtn = card.querySelector('[data-action="settings"]');
          settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetTargetId = habit.id;
            resetSheetOverlay.classList.add('active');
          });

          let pressTimer = null;
          let isLongPress = false;

          card.addEventListener('touchstart', (e) => {
            isLongPress = false;
            pressTimer = setTimeout(() => {
              isLongPress = true;
              haptic();
              const rect = card.getBoundingClientRect();
              const touch = e.touches[0];
              currentHabitId = habit.id;
              longpressMenu.style.left = (touch.clientX - 90) + 'px';
              longpressMenu.style.top = (rect.top - 20) + 'px';
              longpressMenu.classList.add('active');
            }, 500);
          });

          card.addEventListener('touchmove', () => clearTimeout(pressTimer));
          card.addEventListener('touchend', () => {
            clearTimeout(pressTimer);
          });

          card.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            isLongPress = false;
            pressTimer = setTimeout(() => {
              isLongPress = true;
              haptic();
              const rect = card.getBoundingClientRect();
              currentHabitId = habit.id;
              longpressMenu.style.left = (e.clientX - 90) + 'px';
              longpressMenu.style.top = (rect.top - 20) + 'px';
              longpressMenu.classList.add('active');
            }, 500);
          });

          card.addEventListener('mouseup', () => clearTimeout(pressTimer));
          card.addEventListener('mouseleave', () => clearTimeout(pressTimer));

          habitsGrid.appendChild(card);
        });
      }

      function toggleHabit(id) {
        const habits = appData.habits || [];
        const habit = habits.find(h => h.id === id);
        if (!habit) return;
        const today = getToday();

        if (habit.lastDate === today && habit.completedToday) {
          habit.completedToday = false;
          habit.streak = Math.max(0, habit.streak - 1);
          habit.lastDate = today;
          showNotification(habit.name, 'Undone today');
        } else {
          if (habit.lastDate === today) {
            habit.completedToday = true;
            habit.streak += 1;
          } else {
            const daysDiff = Math.floor((new Date(today) - new Date(habit.lastDate || habit.createdAt)) / (1000 * 60 * 60 * 24));
            if (daysDiff === 1) {
              habit.streak += 1;
            } else if (daysDiff > 1) {
              habit.streak = 1;
            } else {
              habit.streak = 1;
            }
            habit.completedToday = true;
            habit.lastDate = today;
          }
          showNotification(habit.name, 'Streak: ' + habit.streak);
        }
        saveData();
        renderHabits();
        haptic();
      }

      function openCreateSheet() {
        const habits = appData.habits || [];
        if (habits.length >= 2) {
          showNotification('Limit reached', 'Maximum 2 habits');
          return;
        }
        habitNameInput.value = '';
        habitGoalInput.value = '';
        sheetOverlay.classList.add('active');
        setTimeout(() => habitNameInput.focus(), 400);
      }

      function closeCreateSheet() {
        sheetOverlay.classList.remove('active');
      }

      function confirmCreate() {
        const habits = appData.habits || [];
        const name = habitNameInput.value.trim();
        const goal = parseInt(habitGoalInput.value);
        if (!name) {
          showNotification('Error', 'Please enter a name');
          return;
        }
        if (!goal || goal < 1) {
          showNotification('Error', 'Please enter a valid goal');
          return;
        }
        if (habits.length >= 2) {
          showNotification('Limit reached', 'Maximum 2 habits');
          closeCreateSheet();
          return;
        }
        const newHabit = {
          id: 'h' + Date.now(),
          name: name,
          goal: goal,
          streak: 0,
          completedToday: false,
          lastDate: getToday(),
          createdAt: getToday()
        };
        appData.habits.push(newHabit);
        saveData();
        renderHabits();
        closeCreateSheet();
        showNotification('Habit created', name);
        haptic();
      }

      function confirmReset() {
        if (resetTargetId) {
          const habits = appData.habits || [];
          const habit = habits.find(h => h.id === resetTargetId);
          if (habit) {
            habit.streak = 0;
            habit.completedToday = false;
            habit.lastDate = getToday();
            saveData();
            renderHabits();
            showNotification('Reset', habit.name);
          }
          resetTargetId = null;
        }
        resetSheetOverlay.classList.remove('active');
        haptic();
      }

      function confirmDelete() {
        if (deleteTargetId) {
          const habits = appData.habits || [];
          const idx = habits.findIndex(h => h.id === deleteTargetId);
          if (idx !== -1) {
            const name = habits[idx].name;
            habits.splice(idx, 1);
            saveData();
            renderHabits();
            showNotification('Deleted', name);
          }
          deleteTargetId = null;
        }
        deleteSheetOverlay.classList.remove('active');
        longpressMenu.classList.remove('active');
        haptic();
      }

      // Navigation
      function setActiveTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.nav-item').forEach(item => {
          item.classList.toggle('active', item.dataset.tab === tabId);
        });

        const tabNames = {
          workouts: 'Workouts',
          calendar: 'Calendar',
          wallet: 'Wallet',
          food: 'Food',
          notes: 'Notes'
        };
        titleEl.textContent = tabNames[tabId] || 'Calendar';

        const isCalendar = tabId === 'calendar';
        const isWorkouts = tabId === 'workouts';

        // Show/hide sections without layout shift
        habitsGrid.style.display = (isCalendar || isWorkouts) ? 'flex' : 'none';
        calendarWidget.style.display = isCalendar ? 'block' : 'none';
        document.getElementById('volumeCard').style.display = (isCalendar || isWorkouts) ? 'flex' : 'none';

        // For workouts tab, show habits but hide calendar
        if (isWorkouts) {
          habitsGrid.style.display = 'flex';
          calendarWidget.style.display = 'none';
          document.getElementById('volumeCard').style.display = 'flex';
          // hide volume card subtitle adjustment
        }

        // Show plus only for calendar and workouts
        addBtn.style.display = (isCalendar || isWorkouts) ? 'flex' : 'none';

        if (!isCalendar && isExpanded) collapseCalendar();
      }

      // Init
      function init() {
        loadData();

        const weekdays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        weekdaysEl.innerHTML = weekdays.map(d => `<span>${d}</span>`).join('');

        renderCalendar();
        renderHabits();

        document.querySelectorAll('.nav-item').forEach(item => {
          item.addEventListener('click', function() {
            setActiveTab(this.dataset.tab);
            haptic();
          });
        });

        addBtn.addEventListener('click', openCreateSheet);

        prevMonthBtn.addEventListener('click', () => {
          currentMonth--;
          if (currentMonth < 0) { currentMonth = 11; currentYear--; }
          renderCalendar();
          haptic();
        });
        nextMonthBtn.addEventListener('click', () => {
          currentMonth++;
          if (currentMonth > 11) { currentMonth = 0; currentYear++; }
          renderCalendar();
          haptic();
        });

        let touchStartX = 0;
        calendarGrid.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].screenX;
        });
        calendarGrid.addEventListener('touchend', (e) => {
          const diff = e.changedTouches[0].screenX - touchStartX;
          if (Math.abs(diff) > 50) {
            if (diff < 0) {
              currentMonth++;
              if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            } else {
              currentMonth--;
              if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            }
            renderCalendar();
            haptic();
          }
        });

        closeJournalBtn.addEventListener('click', collapseCalendar);

        document.getElementById('sheetCancel').addEventListener('click', closeCreateSheet);
        document.getElementById('sheetConfirm').addEventListener('click', confirmCreate);
        sheetOverlay.addEventListener('click', (e) => {
          if (e.target === sheetOverlay) closeCreateSheet();
        });

        document.getElementById('resetCancel').addEventListener('click', () => {
          resetSheetOverlay.classList.remove('active');
          resetTargetId = null;
        });
        document.getElementById('resetConfirm').addEventListener('click', confirmReset);

        document.getElementById('deleteCancel').addEventListener('click', () => {
          deleteSheetOverlay.classList.remove('active');
          deleteTargetId = null;
        });
        document.getElementById('deleteConfirm').addEventListener('click', confirmDelete);

        document.getElementById('menuDelete').addEventListener('click', () => {
          longpressMenu.classList.remove('active');
          if (currentHabitId) {
            deleteTargetId = currentHabitId;
            deleteSheetOverlay.classList.add('active');
          }
        });

        document.addEventListener('click', (e) => {
          if (!longpressMenu.contains(e.target)) {
            longpressMenu.classList.remove('active');
          }
        });

        // Icon
        const canvas = document.createElement('canvas');
        canvas.width = 192;
        canvas.height = 192;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, 192, 192);
        ctx.fillStyle = '#F5F5F7';
        ctx.font = 'bold 80px -apple-system, "SF Pro Display", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PS', 96, 96);
        const link = document.createElement('link');
        link.rel = 'icon';
        link.href = canvas.toDataURL('image/png');
        document.head.appendChild(link);
        const appleLink = document.createElement('link');
        appleLink.rel = 'apple-touch-icon';
        appleLink.href = canvas.toDataURL('image/png');
        document.head.appendChild(appleLink);

        setTimeout(() => {
          showNotification('PS · Fitness', 'Ready for workout');
        }, 400);

        setActiveTab('calendar');

        // Auto reset habits at midnight
        setInterval(() => {
          const today = getToday();
          const habits = appData.habits || [];
          let changed = false;
          habits.forEach(h => {
            if (h.lastDate !== today && h.completedToday) {
              h.completedToday = false;
              h.streak = 0;
              changed = true;
            } else if (h.lastDate !== today && h.streak > 0) {
              h.streak = 0;
              changed = true;
            }
          });
          if (changed) {
            saveData();
            renderHabits();
          }
          renderCalendar();
        }, 60000);
      }

      init();
    })();
  </script>
</body>
</html>
